<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sunshine — 360° Views</title>
  <meta name="description" content="Explore Sunshine Residences through immersive 360° panoramic views">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <link rel="stylesheet" href="/styles.css">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-content">
      <img src="/logo.png" alt="Sunshine" class="loading-logo">
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loading-bar"></div>
      </div>
      <div class="loading-text" id="loading-text">Loading view 1...</div>
    </div>
  </div>

  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner">
      <img src="/logo.png" alt="Sunshine" class="header-logo">
      <div class="header-badge" id="image-counter">1 / 19</div>
    </div>
  </header>

  <!-- Panorama Viewer -->
  <div id="panorama" class="panorama-container"></div>

  <!-- Image Name Overlay -->
  <div class="image-name-toast" id="image-name-toast"></div>

  <!-- Thumbnail Strip -->
  <div class="thumb-strip-wrapper" id="thumb-strip-wrapper">
    <div class="thumb-strip" id="thumb-strip">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Navigation Arrows -->
  <button class="nav-arrow nav-prev" id="nav-prev" aria-label="Previous image">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>
  <button class="nav-arrow nav-next" id="nav-next" aria-label="Next image">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>

  <!-- Toggle thumbnail strip -->
  <button class="toggle-thumbs" id="toggle-thumbs" aria-label="Toggle gallery">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script>
    // ─── Configuration ─────────────────────────────────────────
    const TOTAL_IMAGES = 19;
    // Supabase Storage CDN
    const IMAGE_BASE = 'https://psebongkuvxwusewidsz.supabase.co/storage/v1/object/public/sunshine-360/images';
    const THUMB_BASE = 'https://psebongkuvxwusewidsz.supabase.co/storage/v1/object/public/sunshine-360/thumbnails';

    // ─── State ─────────────────────────────────────────────────
    let viewer = null;
    let currentIndex = 1;
    let loadedImages = new Set();
    let isLoadingFirst = true;

    // ─── DOM refs ──────────────────────────────────────────────
    const loadingScreen = document.getElementById('loading-screen');
    const loadingBar = document.getElementById('loading-bar');
    const loadingText = document.getElementById('loading-text');
    const thumbStrip = document.getElementById('thumb-strip');
    const thumbWrapper = document.getElementById('thumb-strip-wrapper');
    const imageCounter = document.getElementById('image-counter');
    const imageNameToast = document.getElementById('image-name-toast');
    const header = document.getElementById('header');

    // ─── Build thumbnail strip ─────────────────────────────────
    function buildThumbnails() {
      for (let i = 1; i <= TOTAL_IMAGES; i++) {
        const thumb = document.createElement('button');
        thumb.className = 'thumb-item' + (i === 1 ? ' active' : '');
        thumb.dataset.index = i;
        thumb.innerHTML = `
          <img src="${THUMB_BASE}/${i}.jpg" alt="View ${i}" loading="lazy">
          <span class="thumb-number">${i}</span>
          <div class="thumb-loading-dot" id="thumb-dot-${i}"></div>
        `;
        thumb.addEventListener('click', () => switchImage(i));
        thumbStrip.appendChild(thumb);
      }
    }

    // ─── Initialize Pannellum viewer ───────────────────────────
    function initViewer(imageNum) {
      viewer = pannellum.viewer('panorama', {
        type: 'equirectangular',
        panorama: `${IMAGE_BASE}/${imageNum}.jpg`,
        autoLoad: true,
        showControls: false,
        showFullscreenCtrl: false,
        showZoomCtrl: false,
        mouseZoom: true,
        hfov: 110,
        minHfov: 50,
        maxHfov: 120,
        autoRotate: -1.5,
        autoRotateInactivityDelay: 5000,
        friction: 0.15,
        compass: false,
        orientationOnByDefault: false,
        draggable: true,
        disableKeyboardCtrl: false,
        crossOrigin: 'anonymous',
      });

      viewer.on('load', () => {
        loadedImages.add(imageNum);
        markThumbLoaded(imageNum);

        if (isLoadingFirst) {
          isLoadingFirst = false;
          // Reveal the viewer
          loadingScreen.classList.add('fade-out');
          setTimeout(() => {
            loadingScreen.style.display = 'none';
          }, 600);
          // Start background loading the rest
          backgroundLoadImages();
        }
      });
    }

    // ─── Switch to image ───────────────────────────────────────
    function switchImage(index) {
      if (index < 1 || index > TOTAL_IMAGES || index === currentIndex) return;
      currentIndex = index;

      // Update viewer
      viewer.loadScene('default', undefined, undefined, undefined, {
        type: 'equirectangular',
        panorama: `${IMAGE_BASE}/${index}.jpg`,
        autoLoad: true,
        showControls: false,
        showFullscreenCtrl: false,
        showZoomCtrl: false,
        hfov: 110,
        autoRotate: -1.5,
        autoRotateInactivityDelay: 5000,
      });

      // Update UI
      updateActiveThumb(index);
      imageCounter.textContent = `${index} / ${TOTAL_IMAGES}`;
      showImageName(index);
      scrollThumbIntoView(index);
    }

    // ─── Update active thumbnail ───────────────────────────────
    function updateActiveThumb(index) {
      document.querySelectorAll('.thumb-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.index) === index);
      });
    }

    // ─── Mark thumbnail as loaded ──────────────────────────────
    function markThumbLoaded(index) {
      const dot = document.getElementById(`thumb-dot-${index}`);
      if (dot) dot.classList.add('loaded');
    }

    // ─── Scroll thumb into view ────────────────────────────────
    function scrollThumbIntoView(index) {
      const thumb = thumbStrip.querySelector(`[data-index="${index}"]`);
      if (thumb) {
        thumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
    }

    // ─── Show image name toast ─────────────────────────────────
    let nameTimeout;
    function showImageName(index) {
      imageNameToast.textContent = `View ${index}`;
      imageNameToast.classList.add('visible');
      clearTimeout(nameTimeout);
      nameTimeout = setTimeout(() => {
        imageNameToast.classList.remove('visible');
      }, 2000);
    }

    // ─── Background loading ────────────────────────────────────
    async function backgroundLoadImages() {
      for (let i = 2; i <= TOTAL_IMAGES; i++) {
        if (loadedImages.has(i)) continue;
        await new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => {
            loadedImages.add(i);
            markThumbLoaded(i);
            updateLoadingProgress();
            resolve();
          };
          img.onerror = () => resolve();
          img.src = `${IMAGE_BASE}/${i}.jpg`;
        });
      }
    }

    // ─── Update background loading progress ────────────────────
    function updateLoadingProgress() {
      const pct = Math.round((loadedImages.size / TOTAL_IMAGES) * 100);
      loadingBar.style.width = pct + '%';
    }

    // ─── Navigation arrows ─────────────────────────────────────
    document.getElementById('nav-prev').addEventListener('click', () => {
      switchImage(currentIndex > 1 ? currentIndex - 1 : TOTAL_IMAGES);
    });
    document.getElementById('nav-next').addEventListener('click', () => {
      switchImage(currentIndex < TOTAL_IMAGES ? currentIndex + 1 : 1);
    });

    // ─── Keyboard navigation ───────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') switchImage(currentIndex > 1 ? currentIndex - 1 : TOTAL_IMAGES);
      if (e.key === 'ArrowRight') switchImage(currentIndex < TOTAL_IMAGES ? currentIndex + 1 : 1);
    });

    // ─── Toggle thumbnail strip ────────────────────────────────
    let thumbsVisible = true;
    document.getElementById('toggle-thumbs').addEventListener('click', () => {
      thumbsVisible = !thumbsVisible;
      thumbWrapper.classList.toggle('hidden', !thumbsVisible);
      document.getElementById('toggle-thumbs').classList.toggle('collapsed', !thumbsVisible);
    });

    // ─── Auto-hide header on interaction ───────────────────────
    let hideTimeout;
    function showUI() {
      header.classList.remove('hidden');
      thumbWrapper.classList.remove('auto-hidden');
      document.querySelectorAll('.nav-arrow').forEach(a => a.classList.remove('hidden'));
      document.getElementById('toggle-thumbs').classList.remove('hidden');
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(hideUI, 4000);
    }

    function hideUI() {
      header.classList.add('hidden');
      if (thumbsVisible) thumbWrapper.classList.add('auto-hidden');
      document.querySelectorAll('.nav-arrow').forEach(a => a.classList.add('hidden'));
      document.getElementById('toggle-thumbs').classList.add('hidden');
    }

    document.addEventListener('mousemove', showUI);
    document.addEventListener('touchstart', showUI);
    document.addEventListener('click', showUI);

    // ─── Init ──────────────────────────────────────────────────
    buildThumbnails();
    initViewer(1);
    loadingBar.style.width = '5%';
    showUI();
  </script>
</body>
</html>
